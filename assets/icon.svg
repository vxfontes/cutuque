<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="128" y1="64" x2="896" y2="960" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#101828"/>
      <stop offset="0.52" stop-color="#08111F"/>
      <stop offset="1" stop-color="#030712"/>
    </linearGradient>

    <linearGradient id="blueGlow" x1="240" y1="180" x2="820" y2="850" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5DDCFF"/>
      <stop offset="1" stop-color="#3B82F6"/>
    </linearGradient>

    <linearGradient id="orangeGlow" x1="488" y1="365" x2="626" y2="532" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FDBA74"/>
      <stop offset="1" stop-color="#F97316"/>
    </linearGradient>

    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="22" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="0 0 0 0 0.231
                0 0 0 0 0.510
                0 0 0 0 0.965
                0 0 0 0.75 0" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="tapGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="16" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="0 0 0 0 0.976
                0 0 0 0 0.451
                0 0 0 0 0.086
                0 0 0 0.9 0" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <clipPath id="terminalClip">
      <rect x="214" y="276" width="596" height="472" rx="96"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" fill="url(#bg)"/>

  <!-- Subtle radial app glow -->
  <circle cx="512" cy="512" r="386" fill="#2563EB" opacity="0.08"/>
  <circle cx="512" cy="512" r="286" fill="#38BDF8" opacity="0.05"/>

  <!-- Terminal card -->
  <rect x="214" y="276" width="596" height="472" rx="96" fill="#07111F"/>
  <rect x="214" y="276" width="596" height="472" rx="96" stroke="#1E3A5F" stroke-width="8"/>

  <!-- Terminal top bar -->
  <g clip-path="url(#terminalClip)">
    <rect x="214" y="276" width="596" height="104" fill="#0F1B2D"/>
    <circle cx="306" cy="328" r="16" fill="#F97316"/>
    <circle cx="362" cy="328" r="16" fill="#22C55E"/>
    <circle cx="418" cy="328" r="16" fill="#38BDF8"/>
  </g>

  <!-- Prompt chevron -->
  <path
    d="M360 477L432 512L360 547"
    stroke="url(#blueGlow)"
    stroke-width="46"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Cursor / pulse stem -->
  <rect
    x="497"
    y="468"
    width="52"
    height="160"
    rx="26"
    fill="url(#blueGlow)"
  />

  <!-- Haptic tap point -->
  <circle
    cx="584"
    cy="448"
    r="44"
    fill="url(#orangeGlow)"
    filter="url(#tapGlow)"
  />

  <!-- Haptic waves -->
  <path
    d="M645 390C682 427 682 488 645 525"
    stroke="#F97316"
    stroke-width="30"
    stroke-linecap="round"
    opacity="0.95"
  />
  <path
    d="M701 335C769 403 769 512 701 580"
    stroke="#F97316"
    stroke-width="24"
    stroke-linecap="round"
    opacity="0.62"
  />
  <path
    d="M755 282C853 380 853 535 755 633"
    stroke="#F97316"
    stroke-width="18"
    stroke-linecap="round"
    opacity="0.32"
  />

  <!-- Watch/pulse hint: wrist band curve -->
  <path
    d="M320 682C410 724 604 724 684 652"
    stroke="#38BDF8"
    stroke-width="34"
    stroke-linecap="round"
    opacity="0.85"
  />

  <!-- Small terminal output lines -->
  <rect x="364" y="654" width="132" height="22" rx="11" fill="#60A5FA" opacity="0.38"/>
  <rect x="528" y="654" width="92" height="22" rx="11" fill="#60A5FA" opacity="0.24"/>
</svg>
