# Deploy do Cutuque Hub no ZimaOS (192.0.2.10), Fase 5.
#
# Ver docs/12-deploy-zimaos.md para o passo a passo completo (clonar, criar
# ./config/hub.env + ./config/key.p8, subir, healthcheck, rollback).

services:
  cutuque-hub:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cutuque-hub
    # host: o hub precisa bindar DIRETO na interface Tailscale
    # (192.0.2.10, ver internal/config CUTUQUE_BIND) — sem isso, o
    # bridge network padrão do Docker exigiria port-forward manual e o hub
    # ficaria acessível só via a rede interna do Docker, não na Tailscale.
    network_mode: host
    # restart always: o hub deve voltar sozinho depois de reboot do ZimaOS ou
    # crash do processo — é o serviço que segura TODAS as sessões de agente
    # (docs/03) e o único canal de notificação (APNs); ninguém deve precisar
    # entrar por ssh para religar manualmente.
    restart: always
    env_file:
      - ./config/hub.env
    environment:
      # Persiste os device tokens (push APNs) em disco, no volume ./data abaixo.
      # Sem isso, um restart/deploy do hub esvazia a lista e um push disparado
      # antes de o app reabrir e re-registrar se perde.
      - CUTUQUE_DEVICES_PATH=/data/devices.json
      # Persiste a metadata das sessões (sem output): sobrevivem a restart/deploy,
      # senão sessões concluídas reaparecem como "rodando" e a lista some.
      - CUTUQUE_SESSIONS_PATH=/data/sessions.json
    volumes:
      # Credencial APNs (.p8) — nunca versionada (ver .gitignore), montada
      # read-only. O caminho dentro do container tem que casar com
      # CUTUQUE_APNS_KEY_PATH no hub.env (ex.: /config/key.p8).
      - ./config/key.p8:/config/key.p8:ro
      # ssh DEDICADO do container (isolado do ~/.ssh do host, para não interferir
      # no ssh de gerência do ZimaOS): contém só a chave cutuque_hub, o
      # known_hosts (Mac + macmini) e um config com os aliases usados em
      # CUTUQUE_SSH_TARGETS (mac-cutuque, macmini-self → IdentityFile
      # /root/.ssh/cutuque_hub). Read-only; o container roda como root para ler
      # a chave 600 herdada do host.
      - ./config/ssh:/root/.ssh:ro
      # Estado persistente do hub (device tokens do push). Sobrevive a
      # restart/deploy do container. Só dados gerados pelo hub — nada de segredo.
      - ./data:/data
    # A porta 8787 já é exposta via host network (network_mode: host) — sem
    # necessidade de "ports:" aqui.
