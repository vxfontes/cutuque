name: CutuqueApp
options:
  bundleIdPrefix: com.vxfontes
  deploymentTarget:
    iOS: "17.0"
targets:
  CutuqueApp:
    type: application
    platform: iOS
    sources: [CutuqueApp, Shared]
    # Entitlements de push (Fase 4). aps-environment=development para APNs de dev.
    # No simulador, com CODE_SIGNING_ALLOWED=NO, o arquivo não é embutido, mas o
    # build segue funcionando e o push simulado (xcrun simctl push) dispensa APNs real.
    entitlements:
      path: CutuqueApp/CutuqueApp.entitlements
      properties:
        aps-environment: development
        # Sem esta entitlement a Apple rebaixa o interruption-level time-sensitive
        # do needs_you e o cutucão não fura Focus/DND (review F4, bloqueante #2).
        # É self-service — não exige aprovação da Apple.
        com.apple.developer.usernotifications.time-sensitive: true
    info:
      path: CutuqueApp/Info.plist
      properties:
        UILaunchScreen: {}
        CFBundleDisplayName: Cutuque
        CFBundleShortVersionString: "1.5.0"
        CFBundleVersion: "7"
        # Live Activities (Dynamic Island / tela de bloqueio) para sessões rodando.
        NSSupportsLiveActivities: true
        # Declara criptografia isenta (ex.: TLS/HTTPS e APIs do sistema) para
        # evitar a pergunta manual de conformidade de exportação no App Store Connect.
        ITSAppUsesNonExemptEncryption: false
        # Scheme para o deep-link da Live Activity (cutuque://session/<id>).
        CFBundleURLTypes:
          - CFBundleURLSchemes: [cutuque]
        # Sem esta chave o iOS bloqueia SILENCIOSAMENTE o app de falar com IPs
        # privados/Tailscale (o app não emite request nenhum). Com ela, o iOS
        # mostra o prompt de Rede Local e passa a permitir após o usuário aceitar.
        NSLocalNetworkUsageDescription: "O Cutuque fala com o seu hub na rede privada (Tailscale) para listar sessões e receber avisos."
        # Dev: HTTP liberado. IMPORTANTE — só NSAllowsArbitraryLoads: se ele
        # coexistir com NSAllowsLocalNetworking, o iOS IGNORA o ArbitraryLoads
        # (trata como false) e o LocalNetworking NÃO cobre a faixa CGNAT
        # 100.64/10 do Tailscale → HTTP pro hub dá erro -1022. Apertar (HTTPS/
        # exceção por domínio) antes da App Store (Fase 5+).
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vxfontes.cutuque
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - target: CutuqueWidgets
      - target: CutuqueWatch
        embed: true

  # App do Apple Watch (watchOS 9+ single-target). Cliente fino que fala com o
  # iPhone via WatchConnectivity (o hub só existe na Tailscale, fora do alcance
  # do relógio).
  CutuqueWatch:
    type: application
    platform: watchOS
    deploymentTarget: "10.0"
    sources: [CutuqueWatch]
    resources: [CutuqueWatch/Assets.xcassets]
    info:
      path: CutuqueWatch/Info.plist
      properties:
        CFBundleDisplayName: Cutuque
        CFBundleIconName: AppIcon
        CFBundleShortVersionString: "1.5.0"
        CFBundleVersion: "7"
        ITSAppUsesNonExemptEncryption: false
        WKApplication: true
        WKCompanionAppBundleIdentifier: com.vxfontes.cutuque
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vxfontes.cutuque.watchkitapp
        SWIFT_VERSION: "5.9"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  # Widget extension: hospeda a Live Activity (ActivityKit vive numa extension).
  CutuqueWidgets:
    type: app-extension
    platform: iOS
    sources: [CutuqueWidgets, Shared]
    info:
      path: CutuqueWidgets/Info.plist
      properties:
        CFBundleDisplayName: Cutuque
        CFBundleShortVersionString: "1.5.0"
        CFBundleVersion: "7"
        ITSAppUsesNonExemptEncryption: false
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vxfontes.cutuque.widgets
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1"
